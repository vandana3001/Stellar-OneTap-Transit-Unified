name: Stellar Transit Unified CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit + integration tests (all 3 contracts)
        run: cargo test --workspace --verbose

      - name: Build contracts for wasm32 (release)
        run: |
          cargo build --target wasm32-unknown-unknown --release -p operator-registry
          cargo build --target wasm32-unknown-unknown --release -p fare-token
          cargo build --target wasm32-unknown-unknown --release -p transit-controller

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm-binaries
          path: target/wasm32-unknown-unknown/release/*.wasm

  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test -- --watchAll=false
      - name: Build production bundle
        run: npm run build

  deploy-testnet:
    name: Deploy to Stellar Testnet
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt
      - name: Build optimized wasm
        run: |
          cargo build --target wasm32-unknown-unknown --release
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/operator_registry.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/fare_token.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/transit_controller.wasm
      - name: Deploy to testnet
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: |
          stellar keys add deployer --secret-key "$DEPLOYER_SECRET_KEY" || true
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/operator_registry.optimized.wasm \
            --source deployer --network testnet
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/fare_token.optimized.wasm \
            --source deployer --network testnet
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/transit_controller.optimized.wasm \
            --source deployer --network testnet
